server:
  port: 8085

spring:
  application:
    name: ai-service
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

application:
  event-service-url: ${APPLICATION_EVENT_SERVICE_URL:http://localhost:8084}
  internal-secret: ${GATEWAY_INTERNAL_SECRET:}
  workspace-root: ${WORKSPACE_ROOT:/app/workspaces}
  github-token: ${GITHUB_TOKEN:}
  max-retries: 3
  kafka:
    enabled: ${APPLICATION_KAFKA_ENABLED:false}
    consumer-enabled: ${APPLICATION_KAFKA_CONSUMER_ENABLED:false}
    topic: ${APPLICATION_KAFKA_TOPIC:ai.eval.requests.v1}
  gemini:
    model: ${GEMINI_MODEL:gemini-3.1-pro-preview}

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
