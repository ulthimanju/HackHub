spring.application.name=notification-service
server.port=8082

# JWT (shared secret with auth-service — used to validate WebSocket STOMP connections)
application.security.jwt.secret-key=${APPLICATION_SECURITY_JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Redis Configuration (For OTP storage)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# OTP Configuration
app.otp.expiration-minutes=5
app.otp.rate-limit.item-limit=${APP_ITEM_LIMIT:5}
app.otp.rate-limit.time-limit-minutes=${APP_TIME_LIMIT:30}
