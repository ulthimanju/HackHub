server:
  port: 8000

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authService
                fallbackUri: forward:/fallback/auth
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: notification-service
          uri: http://notification-service:8082
          predicates:
            - Path=/notifications/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: notificationService
                fallbackUri: forward:/fallback/notification
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

        - id: notification-ws
          uri: http://notification-service:8082
          predicates:
            - Path=/ws-notifications/**

        - id: event-service
          uri: http://event-service:8084
          predicates:
            - Path=/events/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: eventService
                fallbackUri: forward:/fallback/event
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: ai-service
          uri: http://ai-service:8085
          predicates:
            - Path=/ai/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: aiService
                fallbackUri: forward:/fallback/ai

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      authService:
        baseConfig: default
      notificationService:
        baseConfig: default
      eventService:
        baseConfig: default
      aiService:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
    instances:
      eventService:
        timeoutDuration: 30s

application:
  security:
    jwt:
      secret-key: ${APPLICATION_SECURITY_JWT_SECRET_KEY}
  internal:
    gateway-secret: ${GATEWAY_INTERNAL_SECRET}
