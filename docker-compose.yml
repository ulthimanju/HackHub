version: '3.8'

services:
  auth-db:
    image: postgres:15
    container_name: ehub-auth-db
    environment:
      POSTGRES_DB: ehub_auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
    secrets:
      - db-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ehub-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/ehub_auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      APPLICATION_NOTIFICATION_SERVICE_BASE_URL: http://notification-service:8082/notifications
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    secrets:
      - source: db-password
        target: SPRING_DATASOURCE_PASSWORD
      - source: jwt-secret
        target: APPLICATION_SECURITY_JWT_SECRET_KEY
      - source: internal-secret
        target: GATEWAY_INTERNAL_SECRET
    networks:
      - ehub-network

  redis:
    image: redis:7-alpine
    container_name: ehub-redis
    networks:
      - ehub-network

  kafka:
    image: bitnami/kafka:3.7
    container_name: ehub-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - ehub-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      - redis
      - kafka
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APPLICATION_KAFKA_CONSUMER_NOTIFICATIONS_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
    secrets:
      - source: gmail-username
        target: GMAIL_USERNAME
      - source: gmail-app-password
        target: GMAIL_APP_PASSWORD
      - source: app-item-limit
        target: APP_ITEM_LIMIT
      - source: app-time-limit
        target: APP_TIME_LIMIT
      - source: jwt-secret
        target: APPLICATION_SECURITY_JWT_SECRET_KEY
    networks:
      - ehub-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - notification-service
      - event-service
    environment:
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
    secrets:
      - source: jwt-secret
        target: APPLICATION_SECURITY_JWT_SECRET_KEY
      - source: internal-secret
        target: GATEWAY_INTERNAL_SECRET
    networks:
      - ehub-network

  event-db:
    image: postgres:15
    container_name: ehub-event-db
    environment:
      POSTGRES_DB: ehub_event_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
    secrets:
      - db-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ehub-network

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    container_name: event-service
    depends_on:
      event-db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://event-db:5432/ehub_event_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      APPLICATION_NOTIFICATION_SERVICE_URL: http://notification-service:8082/notifications/send-alert
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APPLICATION_KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    secrets:
      - source: db-password
        target: SPRING_DATASOURCE_PASSWORD
      - source: internal-secret
        target: GATEWAY_INTERNAL_SECRET
    networks:
      - ehub-network

  client-service:
    build:
      context: .
      dockerfile: client-service/Dockerfile
    container_name: client-service
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - ehub-network

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: ai-service
    volumes:
      - ehub-workspaces:/app/workspaces
      # Mount host Google OAuth credentials so gemini CLI authenticates
      - C:/Users/umanj/.gemini:/root/.gemini
    depends_on:
      - event-service
      - redis
      - kafka
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APPLICATION_EVENT_SERVICE_URL: http://event-service:8084
      WORKSPACE_ROOT: /app/workspaces
      APPLICATION_KAFKA_ENABLED: "true"
      APPLICATION_KAFKA_CONSUMER_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
    secrets:
      - source: github-token
        target: GITHUB_TOKEN
      - source: internal-secret
        target: GATEWAY_INTERNAL_SECRET
    networks:
      - ehub-network

secrets:
  db-password:
    file: .secrets/db-password.txt
  jwt-secret:
    file: .secrets/jwt-secret.txt
  internal-secret:
    file: .secrets/internal-secret.txt
  gmail-app-password:
    file: .secrets/gmail-app-password.txt
  gmail-username:
    file: .secrets/gmail-username.txt
  app-item-limit:
    file: .secrets/app-item-limit.txt
  app-time-limit:
    file: .secrets/app-time-limit.txt
  github-token:
    file: .secrets/github-token.txt

networks:
  ehub-network:
    driver: bridge

volumes:
  ehub-workspaces:

