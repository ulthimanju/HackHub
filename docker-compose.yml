version: '3.8'

services:
  auth-db:
    image: postgres:15
    container_name: ehub-auth-db
    environment:
      POSTGRES_DB: ehub_auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
    secrets:
      - db-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ehub-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      auth-db:
        condition: service_healthy
      common-services:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/ehub_auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      APPLICATION_NOTIFICATION_SERVICE_URL: http://notification-service:8082/notifications/password-reset/validate
      APPLICATION_COMMON_SERVICE_URL: http://common-services:8083/common
    secrets:
      - source: db-password
        target: SPRING_DATASOURCE_PASSWORD
      - source: jwt-secret
        target: APPLICATION_SECURITY_JWT_SECRET_KEY
    networks:
      - ehub-network

  redis:
    image: redis:7-alpine
    container_name: ehub-redis
    networks:
      - ehub-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      - redis
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
    secrets:
      - source: gmail-username
        target: GMAIL_USERNAME
      - source: gmail-app-password
        target: GMAIL_APP_PASSWORD
      - source: app-item-limit
        target: APP_ITEM_LIMIT
      - source: app-time-limit
        target: APP_TIME_LIMIT
    networks:
      - ehub-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - notification-service
      - event-service
    environment:
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
    secrets:
      - source: jwt-secret
        target: APPLICATION_SECURITY_JWT_SECRET_KEY
    networks:
      - ehub-network

  event-db:
    image: postgres:15
    container_name: ehub-event-db
    environment:
      POSTGRES_DB: ehub_event_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
    secrets:
      - db-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ehub-network

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    container_name: event-service
    depends_on:
      event-db:
        condition: service_healthy
      common-services:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://event-db:5432/ehub_event_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      APPLICATION_COMMON_SERVICE_URL: http://common-services:8083/common
      APPLICATION_NOTIFICATION_SERVICE_URL: http://notification-service:8082/notifications/send-alert
    secrets:
      - source: db-password
        target: SPRING_DATASOURCE_PASSWORD
    networks:
      - ehub-network

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: ai-service
    depends_on:
      - event-service
      - redis
    environment:
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APPLICATION_EVENT_SERVICE_URL: http://event-service:8084
    secrets:
      - source: gemini-api-key
        target: GEMINI_API_KEY
      - source: gemini-api-key
        target: GOOGLE_API_KEY
      - source: github-token
        target: GITHUB_TOKEN
    networks:
      - ehub-network

  common-services:
    build:
      context: .
      dockerfile: shared-kernel/Dockerfile
    container_name: common-services
    networks:
      - ehub-network

  client-service:
    build:
      context: .
      dockerfile: client-service/Dockerfile
    container_name: client-service
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - ehub-network

secrets:
  db-password:
    file: .secrets/db-password.txt
  jwt-secret:
    file: .secrets/jwt-secret.txt
  gemini-api-key:
    file: .secrets/gemini-api-key.txt
  gmail-app-password:
    file: .secrets/gmail-app-password.txt
  gmail-username:
    file: .secrets/gmail-username.txt
  app-item-limit:
    file: .secrets/app-item-limit.txt
  app-time-limit:
    file: .secrets/app-time-limit.txt
  github-token:
    file: .secrets/github-token.txt

networks:
  ehub-network:
    driver: bridge
