version: '3.8'

services:
  auth-db:
    image: postgres:15
    container_name: ehub-auth-db
    environment:
      POSTGRES_DB: ehub_auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
    secrets:
      - db-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ehub-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/ehub_auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      # db-password from secrets will map to db.password or spring.datasource.password via configtree
      # we need to tell spring where to look for configtree
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      # Map specific secrets to properties if naming doesn't match exactly
      SPRING_DATASOURCE_PASSWORD: "${db-password}"
      APPLICATION_SECURITY_JWT_SECRET_KEY: "${jwt-secret}"
      APPLICATION_NOTIFICATION_SERVICE_URL: http://notification-service:8082/notifications/password-reset/validate
      APPLICATION_COMMON_SERVICE_URL: http://common-services:8083/common
    secrets:
      - db-password
      - jwt-secret
    networks:
      - ehub-network

  redis:
    image: redis:7-alpine
    container_name: ehub-redis
    networks:
      - ehub-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      - redis
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      GMAIL_USERNAME: ${GMAIL_USERNAME}
      GMAIL_APP_PASSWORD: "${gmail-app-password}"
      APP_ITEM_LIMIT: ${APP_ITEM_LIMIT}
      APP_TIME_LIMIT: ${APP_TIME_LIMIT}
    secrets:
      - gmail-app-password
    networks:
      - ehub-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - notification-service
      - event-service
    environment:
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      APPLICATION_SECURITY_JWT_SECRET_KEY: "${jwt-secret}"
    secrets:
      - jwt-secret
    networks:
      - ehub-network

  event-db:
    image: postgres:15
    container_name: ehub-event-db
    environment:
      POSTGRES_DB: ehub_event_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
    secrets:
      - db-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ehub-network

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    container_name: event-service
    depends_on:
      event-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://event-db:5432/ehub_event_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      SPRING_DATASOURCE_PASSWORD: "${db-password}"
      APPLICATION_COMMON_SERVICE_URL: http://common-services:8083/common
      APPLICATION_NOTIFICATION_SERVICE_URL: http://notification-service:8082/notifications/send-alert
    secrets:
      - db-password
    networks:
      - ehub-network

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: ai-service
    depends_on:
      - event-service
      - redis
    environment:
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      GEMINI_API_KEY: "${gemini-api-key}"
      GOOGLE_API_KEY: "${gemini-api-key}"
      APPLICATION_EVENT_SERVICE_URL: http://event-service:8084
    secrets:
      - gemini-api-key
    networks:
      - ehub-network

  client-service:
    build:
      context: .
      dockerfile: client-service/Dockerfile
    container_name: client-service
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - ehub-network

secrets:
  db-password:
    file: .secrets/db-password.txt
  jwt-secret:
    file: .secrets/jwt-secret.txt
  gemini-api-key:
    file: .secrets/gemini-api-key.txt
  gmail-app-password:
    file: .secrets/gmail-app-password.txt

networks:
  ehub-network:
    driver: bridge